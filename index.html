<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="left-side">

                <div class="login-form">

                    <h2>Welcome Back  👋</h2>
                    <p>Today is a new day. It's your day. You shape it. 
                    Sign in to start managing your projects.</p>

                    <form>
                        <div class="input">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Example@email.com">
                        </div>
                        <div class="input">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="At least 8 characters">
                        </div>
                        <div class="forgot-link">
                            <a href="#">Forgot Password?</a>
                        </div>
                        <button type="submit" class="signin">Sign in</button>
                    </form>

                    <div class="or">
                        <span class="line"></span>
                        <span class="or-text">Or</span>
                        <span class="line"></span>
                    </div>

                    <div class="social">
                        <button class="google">
                            <img src="Google.png" alt="Google" width="28">
                            <span class="button-text">Sign in with Google</span> 
                        </button>
                        <button class="facebook">
                            <img src="Facebook.png" alt="Facebook" width="28">
                            <span class="button-text">Sign in with Facebook</span> 
                        </button>
                    </div>

                    <p class="signup">Don't you have an account? <a href="#">Sign up</a></p>
                </div>
                <footer class="footer">
                    © 2023 ALL RIGHTS RESERVED
                </footer>
            </div>

            <div class="image-side">
                <img src="Login Art (1).png" alt="Flowers Picture">
            </div>
        </div>
    </body>
</html>
